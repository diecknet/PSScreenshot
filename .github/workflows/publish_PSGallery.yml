name: Publish to PowerShell Gallery
on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      # Get the current version
      - uses: actions/checkout@v3
      - name: Install and cache PowerShell modules
        id: psmodulecache
        uses: potatoqualitee/psmodulecache@ee5e9494714abf56f6efbfa51527b2aec5c761b8
        with:
          modules-to-cache: BuildHelpers
      - shell: pwsh
        # Give an id to the step, so we can reference it later
        id: check_if_versions_bumped
        run: |
          [version]$GalleryVersion = Get-NextNugetPackageVersion -Name Screenshot -ErrorAction Stop
          [version]$GithubVersion = Get-MetaData -Path ./Screenshot/Screenshot.psd1 -PropertyName ModuleVersion -ErrorAction Stop
          $bumped = $GithubVersion -ge $GalleryVersion

          # Set the output named "version_bumped"
          Write-Output "version_bumped=$bumped" >> $ENV:GITHUB_OUTPUT

      - name: Build module
        shell: pwsh
        if: steps.check_if_versions_bumped.outputs.version_bumped == 'True'
        run: Invoke-Build -File .\src\Screenshot.build.ps1 -Task Build

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: Publish-Module -Path .\src\Artifacts\Screenshot.psd1 -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery
